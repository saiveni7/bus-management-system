{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Update Bus</title>
    <link rel="stylesheet" href="{% static 'css/update_bus.css' %}">
</head>
<body>

<div class="form-container">
    <h2>Update Bus</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="bus_name" value="{{ bus.bus_name }}" required>

        <input type="text" name="source" value="{{ bus.source }}" required>

        <input type="text" name="dest" value="{{ bus.dest }}" required>

        <input type="number" name="nos" value="{{ bus.nos }}" required>

        <input type="number" name="price" value="{{ bus.price }}" required>

        <input type="date" name="date" value="{{ bus.date }}" required>

        <input type="time" name="time" value="{{ bus.time }}" required>

        <button type="submit">Update Bus</button>
    </form>
</div>

</body>
</html>
