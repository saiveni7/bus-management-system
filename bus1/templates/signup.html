{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>User Signup</title>

<link rel="stylesheet" href="{% static 'css/signup.css' %}">
<link rel="stylesheet" href="{% static 'css/theme.css' %}">

</head>
<body>

<!-- NAVBAR -->
<nav>
  <a href="{% url 'home' %}">Home</a>
  <a href="{% url 'about' %}">About</a>
  <a href="{% url 'service' %}">Services</a>
  <a href="{% url 'contact' %}">Contact</a>
  <a href="{% url 'login' %}">Login</a>
</nav>

<!-- CENTER CONTAINER -->
<div class="signup-wrapper">

  <div class="signup-box">
    <h2>Create Account</h2>

    <form method="POST" action="{% url 'signup' %}">
      {% csrf_token %}

      <input type="text" name="firstname" placeholder="First Name" required>
      <input type="text" name="lastname" placeholder="Last Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="text" name="mobileno" placeholder="Mobile Number" required>
      <input type="password" name="password" placeholder="Password" required>

      <!-- USER TYPE -->
      <div class="radio-group">
        <label>Select User Type:</label><br>
        <input type="radio" name="user_type" value="vendor" required> Vendor
        <input type="radio" name="user_type" value="customer" required> Customer
      </div>

      <button type="submit">Register</button>
      <button type="reset" class="reset-btn">Clear</button>

      <div class="login-link">
        Already have an account? <a href="{% url 'login' %}">Login</a>
      </div>

    </form>
  </div>

</div>

</body>
</html>
